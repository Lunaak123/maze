<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevent zooming to keep controls working strictly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple's Maze Game</title>
    <link rel="stylesheet" href="/maze/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Player (Rotated Perspective) -->
    <div class="player-container top-player rotated">
        <div class="status" id="status-top">Waiting...</div>
        <canvas id="canvas-top"></canvas>
        <div class="controls">
            <button class="d-pad up" data-dir="up">▲</button>
            <div class="middle-controls">
                <button class="d-pad left" data-dir="left">◀</button>
                <div class="heart-container" id="heart-top">
                    <span>❤️</span>
                </div>
                <button class="d-pad right" data-dir="right">▶</button>
            </div>
            <button class="d-pad down" data-dir="down">▼</button>
        </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Bottom Player -->
    <div class="player-container bottom-player">
        <div class="status" id="status-bottom">Waiting...</div>
        <canvas id="canvas-bottom"></canvas>
        <div class="controls">
            <button class="d-pad up" data-dir="up">▲</button>
            <div class="middle-controls">
                <button class="d-pad left" data-dir="left">◀</button>
                <div class="heart-container" id="heart-bottom">
                    <span>❤️</span>
                </div>
                <button class="d-pad right" data-dir="right">▶</button>
            </div>
            <button class="d-pad down" data-dir="down">▼</button>
        </div>
    </div>

    <div id="game-over-modal" class="hidden">
        <div class="modal-content">
            <h2 id="winner-text">Someone won!</h2>
            <button id="restart-btn">Play Again ❤️</button>
        </div>
    </div>

    <script src="/maze/static/script.js"></script>
</body>
</html>
